name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Format, lint, typecheck, test, smoke, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Smoke
        run: npm run smoke

      - name: Build
        run: npm run build
